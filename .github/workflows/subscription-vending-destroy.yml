name: subscription-vending-destroy

"on":
  workflow_dispatch:
    inputs:
      request_file:
        description: "Arquivo de solicitação versionado no repositório"
        required: true
        default: "requests/app-demo-prd.tfvars.json"
      destroy_confirm:
        description: "Digite DESTROY para confirmar"
        required: true
        default: ""

permissions:
  id-token: write
  contents: read

concurrency:
  group: subscription-vending-avm
  cancel-in-progress: false

jobs:
  destroy:
    name: Terraform Destroy AVM Lab
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_INPUT: false
      TF_IN_AUTOMATION: true

    steps:
      - name: Validate destroy confirmation
        shell: bash
        run: |
          if [ "${{ inputs.destroy_confirm }}" != "DESTROY" ]; then
            echo "Para destruir os recursos, execute novamente informando destroy_confirm=DESTROY."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve request source
        id: request
        shell: bash
        run: |
          REQUEST_FILE="${{ inputs.request_file }}"
          REQUEST_BASENAME=$(basename "$REQUEST_FILE" .tfvars.json)
          SAFE_STATE_KEY=$(echo "$REQUEST_BASENAME" | tr -cs '[:alnum:]-' '-' | sed 's/^-//;s/-$//')
          echo "file=$REQUEST_FILE" >> "$GITHUB_OUTPUT"
          echo "state_key=${SAFE_STATE_KEY}.tfstate" >> "$GITHUB_OUTPUT"

      - name: Validate request file
        shell: pwsh
        run: ./scripts/validate-request.ps1 -RequestFile "${{ steps.request.outputs.file }}"

      - name: Validate GitHub variables
        shell: bash
        run: |
          required_vars=(
            ARM_CLIENT_ID
            ARM_TENANT_ID
            ARM_SUBSCRIPTION_ID
            TF_STATE_RG
            TF_STATE_STORAGE_ACCOUNT
            TF_STATE_CONTAINER
          )

          for var_name in "${required_vars[@]}"; do
            value="${!var_name:-}"
            if [ -z "$value" ]; then
              echo "Required variable is empty: $var_name"
              exit 1
            fi

            if [[ "$value" == \<* ]]; then
              echo "Required variable still contains a placeholder: $var_name=$value"
              exit 1
            fi
          done

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Copy request to Terraform auto vars
        shell: bash
        run: cp "${{ steps.request.outputs.file }}" terraform/terraform.auto.tfvars.json

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ steps.request.outputs.state_key }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform destroy
        working-directory: terraform
        run: terraform destroy -input=false -auto-approve

      - name: Publish destroy summary
        shell: bash
        run: |
          echo "## Subscription Vending Destroy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Request source: `${{ steps.request.outputs.file }}`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Terraform state key: `${{ steps.request.outputs.state_key }}`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: destroy command completed." >> "$GITHUB_STEP_SUMMARY"
