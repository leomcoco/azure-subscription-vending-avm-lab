name: subscription-vending-avm

"on":
  workflow_dispatch:
    inputs:
      request_file:
        description: "Arquivo de solicitação versionado no repositório"
        required: true
        default: "requests/app-demo-prd.tfvars.json"
      apply:
        description: "Executar terraform apply?"
        required: true
        type: boolean
        default: false

  repository_dispatch:
    types:
      - subscription-vending-request

permissions:
  id-token: write
  contents: read

concurrency:
  group: subscription-vending-avm
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform AVM Subscription Vending
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_STATE_RG: ${{ vars.TF_STATE_RG }}
      TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
      TF_INPUT: false
      TF_IN_AUTOMATION: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve request source
        id: request
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            mkdir -p /tmp/subscription-vending

            jq -e '.client_payload.request' "$GITHUB_EVENT_PATH" > /tmp/subscription-vending/request.tfvars.json

            REQUEST_ID=$(jq -r '.client_payload.request.request_id // empty' "$GITHUB_EVENT_PATH")
            if [ -z "$REQUEST_ID" ]; then REQUEST_ID="dispatch-request"; fi

            SAFE_STATE_KEY=$(echo "$REQUEST_ID" | tr -cs '[:alnum:]-' '-' | sed 's/^-//;s/-$//')

            APPLY=$(jq -r '.client_payload.apply // false' "$GITHUB_EVENT_PATH")
            if [ "$APPLY" != "true" ]; then APPLY="false"; fi

            echo "file=/tmp/subscription-vending/request.tfvars.json" >> "$GITHUB_OUTPUT"
            echo "state_key=${SAFE_STATE_KEY}.tfstate" >> "$GITHUB_OUTPUT"
            echo "apply=${APPLY}" >> "$GITHUB_OUTPUT"
            echo "repository_dispatch request resolved without printing payload."
          else
            REQUEST_FILE="${{ inputs.request_file }}"
            REQUEST_BASENAME=$(basename "$REQUEST_FILE" .tfvars.json)
            SAFE_STATE_KEY=$(echo "$REQUEST_BASENAME" | tr -cs '[:alnum:]-' '-' | sed 's/^-//;s/-$//')

            echo "file=$REQUEST_FILE" >> "$GITHUB_OUTPUT"
            echo "state_key=${SAFE_STATE_KEY}.tfstate" >> "$GITHUB_OUTPUT"
            echo "apply=${{ inputs.apply }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Mask runtime identifiers
        if: always()
        shell: bash
        run: |
          echo "::add-mask::$ARM_CLIENT_ID"
          echo "::add-mask::$ARM_TENANT_ID"
          echo "::add-mask::$ARM_SUBSCRIPTION_ID"
          echo "::add-mask::$TF_STATE_STORAGE_ACCOUNT"
          echo "::add-mask::$TF_STATE_RG"
          echo "::add-mask::$TF_STATE_CONTAINER"

          REQUEST_FILE="${{ steps.request.outputs.file }}"

          if [ -f "$REQUEST_FILE" ]; then
            jq -r '.subscription_id // empty' "$REQUEST_FILE" | xargs -r -I{} echo "::add-mask::{}"
            jq -r '.contributor_group_object_id // empty' "$REQUEST_FILE" | xargs -r -I{} echo "::add-mask::{}"
            jq -r '.reader_group_object_id // empty' "$REQUEST_FILE" | xargs -r -I{} echo "::add-mask::{}"
            jq -r '.budget_contact_emails[]? // empty' "$REQUEST_FILE" | xargs -r -I{} echo "::add-mask::{}"
          fi

      - name: Validate request file
        shell: pwsh
        run: ./scripts/validate-request.ps1 -RequestFile "${{ steps.request.outputs.file }}"

      - name: Validate GitHub variables
        shell: bash
        run: |
          required_vars=(
            ARM_CLIENT_ID
            ARM_TENANT_ID
            ARM_SUBSCRIPTION_ID
            TF_STATE_RG
            TF_STATE_STORAGE_ACCOUNT
            TF_STATE_CONTAINER
          )

          for var_name in "${required_vars[@]}"; do
            value="${!var_name:-}"
            if [ -z "$value" ]; then
              echo "Required variable is empty: $var_name"
              exit 1
            fi

            if [[ "$value" == \<* ]]; then
              echo "Required variable still contains a placeholder: $var_name=$value"
              exit 1
            fi
          done

          echo "GitHub variables validated."

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Copy request to Terraform auto vars
        shell: bash
        run: cp "${{ steps.request.outputs.file }}" terraform/terraform.auto.tfvars.json

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ steps.request.outputs.state_key }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Publish workflow summary
        working-directory: terraform
        shell: bash
        run: |
          REQUEST_SOURCE="${{ steps.request.outputs.file }}"
          STATE_KEY="${{ steps.request.outputs.state_key }}"
          APPLY_REQUESTED="${{ steps.request.outputs.apply }}"
          PLAN_SUMMARY=$(terraform show -no-color tfplan | grep -E "Plan:|No changes" || true)

          {
            echo "## Subscription Vending AVM"
            echo ""
            echo "| Item | Valor |"
            echo "|---|---|"
            echo "| Request source | \`$REQUEST_SOURCE\` |"
            echo "| Terraform state key | \`$STATE_KEY\` |"
            echo "| Apply requested | \`$APPLY_REQUESTED\` |"
            echo ""
            if [ -n "$PLAN_SUMMARY" ]; then
              echo "### Terraform plan summary"
              echo ""
              echo "\`\`\`text"
              echo "$PLAN_SUMMARY"
              echo "\`\`\`"
            else
              echo "Terraform plan summary was not detected in the plan output."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        if: steps.request.outputs.apply == 'true'
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform output
        if: steps.request.outputs.apply == 'true'
        working-directory: terraform
        run: terraform output
